name: Build and deploy to GitHub Pages

on:
  push:
    branches: [goit-js-adv-hw] # change to main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # - name: Install and build
      #   run: |
      #     npm install
      #     npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages-test # change to gh-pages
          folder: dist
          dry-run: true # for test, remove before deploy
